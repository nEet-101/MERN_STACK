<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body,html{
            width: 100%;
            height: 100%
        }
        #main{
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;

        }

        .box{
            position: absolute;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) .2s;
            width: 20px;
            height: 20px;
            background-color: rgb(208, 122, 17);
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div class="box"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
