<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
    <style>
        *{
           margin: 0;
           padding: 0;
           box-sizing: border-box;
        }
        
        
        html, body{
            height: 100%;
            width: 100%;
        }

        .main{
            width:100%;
            height: 100%;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fileinpt{
            display: none;
        }
        
        #btn{
            background-color: rgb(58, 178, 136);
            font-size: 1.3rem;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem 2rem;
            border-radius: 0.7rem;
            color: whitesmoke;
        }

        #btn:hover {
            background-color: rgb(26, 110, 81);
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="main">
        <input id="fileinpt" type="file">
        <div id="btn">
            Upload File
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
