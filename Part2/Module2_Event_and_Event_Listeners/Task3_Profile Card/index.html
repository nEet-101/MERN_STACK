<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100%;
            background-color: rgb(57, 57, 57);
        }

        input {
            display: block;
            background-color: rgb(236, 234, 234);
            /* margin: 5px; */
        }

        #main {
            width: 100%;
            height: 100%;
            padding: 30px;
            margin: 10px;
        }

        .card {
            color: white;
            max-width: 300px;
            display: inline-block;
            padding: 20px;
            border: 1px solid #e3e3e3;
            margin-top: 20px;
            border-radius: 10px;
        }

        .profile {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 7px;
            overflow: hidden;
        }
        .card h5 {
            margin-top: 5px;
        }

        .card p {
            margin-top: 10px;
            font-size: 12px;
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;            
        }
    </style>

</head>

<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="profile pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="profession">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
